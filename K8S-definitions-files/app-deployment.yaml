apiVersion: apps/v1
kind: Deployment
metadata:
  name: vproapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vproapp
  template:
    metadata:
      name: vproapp
      labels:
        app: vproapp
    spec:
      initContainers:
        - name: init-rmq
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nslookup vpromq01; do echo 'Waiting for RabbitMQ...'; sleep 2; done",
            ]
        - name: init-mc
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nslookup vprocache01; do echo 'Waiting for Memcached...'; sleep 2; done",
            ]
        - name: init-db
          image: busybox
          command:
            [
              "sh",
              "-c",
              "until nslookup vprodb; do echo 'Waiting for Database...'; sleep 2; done",
            ]
      containers:
        - name: vproapp-container
          image: vanluong2003/vproapp
          ports:
            - name: vproapp-port
              containerPort: 8080
